name: 3) 都道府県指定取得 (minkou + gaccom)

on:
  workflow_dispatch:
    inputs:
      pref:
        description: '都道府県'
        required: true
        type: choice
        options:
          - 北海道
          - 青森県
          - 岩手県
          - 宮城県
          - 秋田県
          - 山形県
          - 福島県
          - 茨城県
          - 栃木県
          - 群馬県
          - 埼玉県
          - 千葉県
          - 東京都
          - 神奈川県
          - 新潟県
          - 富山県
          - 石川県
          - 福井県
          - 山梨県
          - 長野県
          - 岐阜県
          - 静岡県
          - 愛知県
          - 三重県
          - 滋賀県
          - 京都府
          - 大阪府
          - 兵庫県
          - 奈良県
          - 和歌山県
          - 鳥取県
          - 島根県
          - 岡山県
          - 広島県
          - 山口県
          - 徳島県
          - 香川県
          - 愛媛県
          - 高知県
          - 福岡県
          - 佐賀県
          - 長崎県
          - 熊本県
          - 大分県
          - 宮崎県
          - 鹿児島県
          - 沖縄県
      delay:
        description: 'アクセス間隔（秒）'
        required: false
        default: '2.0'
      workers:
        description: '並列ワーカー数'
        required: false
        default: '2'
      force:
        description: 'minkou: 取得済みの市区町村も再取得する（true / false）'
        required: false
        default: 'false'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scrape-pref:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    defaults:
      run:
        working-directory: crawler

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: uv sync

      - name: minkou - Scrape ${{ github.event.inputs.pref }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          FORCE_FLAG=""
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            FORCE_FLAG="--force"
          fi
          uv run python scrapers/minkou/run.py \
            --pref "${{ github.event.inputs.pref }}" \
            --delay "${{ github.event.inputs.delay || '2.0' }}" \
            --workers "${{ github.event.inputs.workers || '2' }}" \
            --auto \
            $FORCE_FLAG

      - name: gaccom - Scrape ${{ github.event.inputs.pref }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          uv run python scrapers/gaccom/run.py \
            --pref "${{ github.event.inputs.pref }}" \
            --delay "${{ github.event.inputs.delay || '2.0' }}" \
            --workers "${{ github.event.inputs.workers || '2' }}"

      - name: fix_prefecture - prefecture フィールド正規化
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          uv run python scrapers/minkou/fix_prefecture.py

      - name: match_schools - ${{ github.event.inputs.pref }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          uv run python scripts/match_schools.py \
            --pref "${{ github.event.inputs.pref }}"
