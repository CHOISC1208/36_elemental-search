name: 3) 都道府県指定取得

on:
  workflow_dispatch:
    inputs:
      pref:
        description: '都道府県名またはスラッグ（例: 東京都 / tokyo / 大阪府 / osaka）'
        required: true
      delay:
        description: 'アクセス間隔（秒）'
        required: false
        default: '2.0'
      workers:
        description: '並列ワーカー数'
        required: false
        default: '2'
      force:
        description: '取得済みの市区町村も再取得する（true / false）'
        required: false
        default: 'false'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scrape-pref:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: uv sync

      - name: Scrape ${{ github.event.inputs.pref }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          FORCE_FLAG=""
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            FORCE_FLAG="--force"
          fi
          uv run python scrapers/minkou/run.py \
            --pref "${{ github.event.inputs.pref }}" \
            --delay "${{ github.event.inputs.delay || '2.0' }}" \
            --workers "${{ github.event.inputs.workers || '2' }}" \
            --auto \
            $FORCE_FLAG
