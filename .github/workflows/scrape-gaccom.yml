name: 4) gaccom取得

on:
  workflow_dispatch:
    inputs:
      delay:
        description: 'アクセス間隔（秒）'
        required: false
        default: '2.0'
      workers:
        description: '並列ワーカー数'
        required: false
        default: '2'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scrape-gaccom:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: uv sync

      - name: Scrape gaccom.jp (関東)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          for pref in 8 9 10 11 12 13 14; do
            uv run python scrapers/gaccom/run.py \
              --pref "$pref" \
              --delay "${{ github.event.inputs.delay || '2.0' }}" \
              --workers "${{ github.event.inputs.workers || '2' }}"
          done
