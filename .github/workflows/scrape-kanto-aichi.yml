name: 4) 関東+愛知 カテゴリ評価再取得

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# 関東7都県 + 愛知: minkou カテゴリ評価のみ再取得（テキスト本文なし、強制再取得）
jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    strategy:
      max-parallel: 1
      matrix:
        pref: [茨城県, 栃木県, 群馬県, 埼玉県, 千葉県, 東京都, 神奈川県, 愛知県]

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: uv sync

      - name: minkou - ${{ matrix.pref }} カテゴリ評価取得
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          uv run python scrapers/minkou/run.py \
            --pref "${{ matrix.pref }}" \
            --auto \
            --force \
            --ratings-only
