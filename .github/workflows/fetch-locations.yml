name: 1) 市区町村取得

on:
  workflow_dispatch:
    inputs:
      pref:
        description: '都道府県スラッグ（例: tokyo）省略時は全都道府県'
        required: false
        default: ''

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  fetch-locations:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: crawler

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: uv sync

      - name: Fetch prefectures & cities
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          if [ -n "${{ github.event.inputs.pref }}" ]; then
            uv run python scrapers/minkou/fetch_locations.py --pref "${{ github.event.inputs.pref }}"
          else
            uv run python scrapers/minkou/fetch_locations.py
          fi
